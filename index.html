<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard IVR Consulta de Placa</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600;800&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif; background: #f0f4f9; color: #1e3a5f; }
    button { font-family: inherit; cursor: pointer; }
    @media print {
      body { background: white !important; }
      .no-print { display: none !important; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }

</head>
<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#1e3a5f">
    <div style="text-align:center">
      <div style="font-size:40px;margin-bottom:12px">⏳</div>
      <div style="font-weight:700;font-size:16px">Cargando dashboard...</div>
    </div>
  </div>
</div>
<script>
window.onerror = function(msg, src, line, col, err) {
  document.getElementById("root").innerHTML = '<div style="padding:40px;text-align:center;color:#c0392b"><div style="font-size:32px;margin-bottom:12px">&#9888;&#65039;</div><div style="font-weight:700;font-size:16px">Error al cargar</div><pre style="margin-top:12px;font-size:11px;text-align:left;background:#fff0ed;padding:12px;border-radius:8px;overflow:auto">' + msg + '\nLinea: ' + line + '</pre></div>';
};
</script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend,
        ResponsiveContainer, LineChart, Line, PieChart, Pie, Cell, ComposedChart } = Recharts;
const C = {
  navy: "#1e3a5f", navyMid: "#2a5298", navyLight: "#3d72c4",
  orange: "#e05c2a", orangeMid: "#f08040",
  bg: "#f0f4f9", white: "#ffffff", border: "#e8eef6", borderLight: "#eef2f7",
  textMuted: "#8a94a6", textSub: "#5a7a9f",
  green: "#2ecc71", greenBg: "#edfff4", redBg: "#fff0ed",
};

const FLAG = { PA: "🇵🇦", CR: "🇨🇷" };
const COUNTRY_NAME = { PA: "Panamá", CR: "Costa Rica" };
const COUNTRIES = ["PA", "CR"];
const FLOW_COLORS = ["#1e3a5f","#3d72c4","#2a5298","#e05c2a","#f08040","#f5aa70","#8a94a6"];

// ─── CSV PARSER ───────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(",");
    return Object.fromEntries(headers.map((h, i) => [h, (vals[i] || "").trim()]));
  });
}

function detectCountry(rows) {
  for (const r of rows) {
    const v = (r["Voicebot"] || "") + (r["Nombre destino"] || "");
    if (v.includes("-pa-")) return "PA";
    if (v.includes("-cr-")) return "CR";
  }
  return null;
}

function parseSec(t) {
  if (!t) return 0;
  const p = t.split(":").map(Number);
  return p.length === 3 ? p[0] * 3600 + p[1] * 60 + p[2] : 0;
}

function fmtSec(s) {
  const n = Number(s);
  if (n < 60) return `${n}s`;
  return `${Math.floor(n / 60)}m ${n % 60}s`;
}

// ─── METRICS ─────────────────────────────────────────────────────────────────
function deriveMetrics(rows, filename) {
  if (!rows.length) return null;
  const country = detectCountry(rows);
  if (!country) return null;
  const byDate = {};
  rows.forEach(r => {
    const d = r["Fecha"] || "Sin fecha";
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(r);
  });
  return Object.entries(byDate).map(([fecha, dayRows]) => deriveDay(dayRows, filename, country, fecha));
}

function deriveDay(rows, filename, country, fecha) {
  const total = rows.length;
  const voicebot = rows[0]["Voicebot"] || "Desconocido";

  const resultados = {};
  rows.forEach(r => { const k = r["Finalizado"] || "Sin dato"; resultados[k] = (resultados[k] || 0) + 1; });

  const flowMap = {
    "Cliente identificado por placa": ["suraplate-identified", "suraplateidentified"],
    "Cliente identificado por teléfono": ["phone-identified"],
    "Fallback (input es No la sé)": ["unknowed-plate", "plateunidentified"],
    "Fallback (consulta de placa 2x)": ["user-unknowed"],
    "Fallback (no se menciona placa)": ["fallback"],
    "Inactividad": ["inactivity"],
  };
  const flows = {};
  const flowDurs = {};
  rows.forEach(r => {
    const nd = (r["Nombre destino"] || "").toLowerCase();
    const dur = parseSec(r["Tiempo total"]);
    let matched = "Colgada (pendiente funnel)";
    for (const [label, patterns] of Object.entries(flowMap)) {
      if (patterns.some(p => nd.includes(p))) { matched = label; break; }
    }
    flows[matched] = (flows[matched] || 0) + 1;
    if (!flowDurs[matched]) flowDurs[matched] = [];
    if (dur > 0) flowDurs[matched].push(dur);
  });
  const flowAvgDur = {};
  Object.entries(flowDurs).forEach(([k, durs]) => {
    flowAvgDur[k] = durs.length ? Math.round(durs.reduce((a, b) => a + b, 0) / durs.length) : 0;
  });

  const durations = rows.map(r => parseSec(r["Tiempo total"])).filter(d => d > 0);
  const avgDur = durations.length ? (durations.reduce((a, b) => a + b, 0) / durations.length).toFixed(0) : 0;
  const maxDur = durations.length ? Math.max(...durations) : 0;
  const minDur = durations.length ? Math.min(...durations) : 0;

  const byHour = {}, byHourDur = {}, byHourColgadas = {};
  rows.forEach(r => {
    const h = (r["Inicio conversación"] || "").split(":")[0];
    const d = parseSec(r["Tiempo total"]);
    if (h) {
      byHour[h] = (byHour[h] || 0) + 1;
      if (!byHourDur[h]) byHourDur[h] = [];
      if (d > 0) byHourDur[h].push(d);
      if (r["Finalizado"] === "Llamada colgada") byHourColgadas[h] = (byHourColgadas[h] || 0) + 1;
    }
  });
  const hourlyData = Object.entries(byHour)
    .sort((a, b) => Number(a[0]) - Number(b[0]))
    .map(([h, c]) => {
      const durs = byHourDur[h] || [];
      const avg = durs.length ? Math.round(durs.reduce((a, b) => a + b, 0) / durs.length) : 0;
      const col = byHourColgadas[h] || 0;
      return { hora: `${h}:00`, llamadas: c, durPromedio: avg, pctColgadas: +((col / c) * 100).toFixed(1) };
    });

  const enviados = resultados["Envío a IVR"] || 0;
  const colgadas = resultados["Llamada colgada"] || 0;
  const tasaExito = +((enviados / total) * 100).toFixed(1);
  const tasaColgada = +((colgadas / total) * 100).toFixed(1);

  const durColgadas = rows.filter(r => r["Finalizado"] === "Llamada colgada")
    .map(r => parseSec(r["Tiempo total"])).filter(d => d > 0);
  const avgDurColgadas = durColgadas.length
    ? (durColgadas.reduce((a, b) => a + b, 0) / durColgadas.length).toFixed(0) : 0;

  return { country, voicebot, fecha, filename, total, flows, flowAvgDur, avgDur, maxDur, minDur, hourlyData, enviados, colgadas, tasaExito, tasaColgada, avgDurColgadas };
}

// ─── MERGE (ACUMULADO) ────────────────────────────────────────────────────────
function mergeMetrics(days) {
  if (!days.length) return null;
  const total = days.reduce((s, d) => s + d.total, 0);
  const enviados = days.reduce((s, d) => s + d.enviados, 0);
  const colgadas = days.reduce((s, d) => s + d.colgadas, 0);
  const tasaExito = +((enviados / total) * 100).toFixed(1);
  const tasaColgada = +((colgadas / total) * 100).toFixed(1);

  const flows = {};
  const flowDursAcc = {};
  days.forEach(d => {
    Object.entries(d.flows).forEach(([k, v]) => { flows[k] = (flows[k] || 0) + v; });
    if (d.flowAvgDur) Object.entries(d.flowAvgDur).forEach(([k, v]) => {
      if (!flowDursAcc[k]) flowDursAcc[k] = [];
      if (v > 0) flowDursAcc[k].push(v);
    });
  });
  const flowAvgDur = {};
  Object.entries(flowDursAcc).forEach(([k, vs]) => {
    flowAvgDur[k] = vs.length ? Math.round(vs.reduce((a, b) => a + b, 0) / vs.length) : 0;
  });

  const byHour = {};
  days.forEach(d => {
    d.hourlyData.forEach(h => {
      if (!byHour[h.hora]) byHour[h.hora] = { llamadas: 0, durSum: 0, durCount: 0, colgadasSum: 0 };
      byHour[h.hora].llamadas += h.llamadas;
      if (h.durPromedio > 0) { byHour[h.hora].durSum += h.durPromedio; byHour[h.hora].durCount++; }
      byHour[h.hora].colgadasSum += Math.round((h.pctColgadas / 100) * h.llamadas);
    });
  });
  const hourlyData = Object.entries(byHour)
    .sort((a, b) => Number(a[0].split(":")[0]) - Number(b[0].split(":")[0]))
    .map(([hora, v]) => ({
      hora, llamadas: v.llamadas,
      durPromedio: v.durCount ? Math.round(v.durSum / v.durCount) : 0,
      pctColgadas: +((v.colgadasSum / v.llamadas) * 100).toFixed(1),
    }));

  const allDurs = days.flatMap(d => d.avgDur > 0 ? [Number(d.avgDur)] : []);
  const avgDur = allDurs.length ? (allDurs.reduce((a, b) => a + b, 0) / allDurs.length).toFixed(0) : 0;
  const maxDur = days.reduce((m, d) => Math.max(m, d.maxDur), 0);
  const minDur = days.reduce((m, d) => d.minDur > 0 ? Math.min(m, d.minDur) : m, Infinity);
  const allColgDurs = days.flatMap(d => d.avgDurColgadas > 0 ? [Number(d.avgDurColgadas)] : []);
  const avgDurColgadas = allColgDurs.length
    ? (allColgDurs.reduce((a, b) => a + b, 0) / allColgDurs.length).toFixed(0) : 0;

  const fechas = [...new Set(days.map(d => d.fecha))].sort();
  return {
    country: days[0].country, voicebot: days[0].voicebot,
    fecha: fechas.length === 1 ? fechas[0] : `${fechas[0]} → ${fechas[fechas.length - 1]}`,
    filename: `${days.length} archivo(s)`,
    total, enviados, colgadas, tasaExito, tasaColgada,
    flows, flowAvgDur, hourlyData, avgDur, maxDur,
    minDur: minDur === Infinity ? 0 : minDur, avgDurColgadas,
  };
}

// ─── STAT CARD ────────────────────────────────────────────────────────────────
function StatCard({ label, value, sub, accent, icon }) {
  return (
    <div style={{ background: C.white, borderRadius: 12, padding: "16px 20px", boxShadow: "0 2px 10px rgba(0,0,0,0.06)", border: `1px solid ${C.borderLight}`, flex: "1 1 150px", minWidth: 140 }}>
      <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>{icon} {label}</div>
      <div style={{ fontSize: 26, fontWeight: 800, color: accent || C.navy, fontFamily: "'IBM Plex Mono', monospace", lineHeight: 1.1 }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: C.textMuted, marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

// ─── FLOW TABLE (with avg duration) ──────────────────────────────────────────
function FlowTable({ flows, flowAvgDur, total }) {
  return (
    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
      <thead>
        <tr style={{ background: "#f5f8ff" }}>
          {["Flujo de Destino", "Llamadas", "% del Total", "Dur. Promedio"].map(h => (
            <th key={h} style={{ padding: "8px 12px", textAlign: "left", color: C.textMuted, fontWeight: 600, borderBottom: `1px solid ${C.borderLight}`, fontSize: 11 }}>{h}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {Object.entries(flows).sort((a, b) => b[1] - a[1]).map(([flow, count]) => (
          <tr key={flow} style={{ borderBottom: `1px solid ${C.borderLight}` }}>
            <td style={{ padding: "8px 12px", color: C.textSub }}>{flow}</td>
            <td style={{ padding: "8px 12px", fontFamily: "'IBM Plex Mono', monospace", fontWeight: 700, color: C.navy }}>{count}</td>
            <td style={{ padding: "8px 12px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ flex: 1, background: C.borderLight, borderRadius: 4, height: 6 }}>
                  <div style={{ width: `${((count / total) * 100).toFixed(0)}%`, background: C.navy, borderRadius: 4, height: 6 }} />
                </div>
                <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: C.textMuted, minWidth: 38 }}>
                  {((count / total) * 100).toFixed(1)}%
                </span>
              </div>
            </td>
            <td style={{ padding: "8px 12px", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: C.navyMid, fontWeight: 600 }}>
              {flowAvgDur && flowAvgDur[flow] ? fmtSec(flowAvgDur[flow]) : "—"}
            </td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

// ─── COUNTRY PANEL ────────────────────────────────────────────────────────────
function CountryPanel({ m }) {
  if (!m) return (
    <div style={{ textAlign: "center", padding: 60, color: C.textMuted }}>
      <div style={{ fontSize: 48, marginBottom: 12 }}>📂</div>
      <div style={{ fontWeight: 600, fontSize: 16 }}>Sin datos cargados</div>
      <div style={{ fontSize: 13, marginTop: 6 }}>Sube un archivo CSV usando el botón de arriba.</div>
    </div>
  );

  const pd = Object.entries(m.flows).sort((a, b) => b[1] - a[1])
    .map(([name, value], i) => ({ name, value, color: FLOW_COLORS[i % FLOW_COLORS.length] }));
  const flowTotal = pd.reduce((s, d) => s + d.value, 0);

  return (
    <div>
      <div style={{ background: "#f0f7ff", borderRadius: 10, padding: "10px 16px", marginBottom: 18, fontSize: 12, color: C.textSub, display: "flex", gap: 24, flexWrap: "wrap" }}>
        <span>🤖 <strong>Voicebot:</strong> {m.voicebot}</span>
        <span>📅 <strong>Fecha:</strong> {m.fecha}</span>
        <span>📄 <strong>Archivo:</strong> {m.filename}</span>
        <span>📞 <strong>Total:</strong> {m.total}</span>
      </div>

      <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 20 }}>
        <StatCard label="Total Llamadas" value={m.total} icon="📞" />
        <StatCard label="Llamadas completas" value={m.enviados} sub={`${m.tasaExito}% del total`} accent={C.navy} icon="✅" />
        <StatCard label="Llamadas Colgadas" value={m.colgadas} sub={`${m.tasaColgada}% del total`} accent={C.orange} icon="📵" />
        <StatCard label="Duración Promedio" value={fmtSec(m.avgDur)} sub={`Mín: ${fmtSec(m.minDur)} · Máx: ${fmtSec(m.maxDur)}`} icon="⏱️" />
        <StatCard label="Dur. Prom. Colgadas" value={fmtSec(m.avgDurColgadas)} sub="Promedio llamadas colgadas" accent={C.orange} icon="⏱️" />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 18 }}>
        {/* Donut flujos */}
        <div style={{ background: C.white, borderRadius: 12, padding: "18px 20px", boxShadow: "0 2px 10px rgba(0,0,0,0.06)", border: `1px solid ${C.borderLight}` }}>
          <div style={{ fontWeight: 700, color: C.navy, marginBottom: 14 }}>📊 Distribución de Flujos de Destino</div>
          <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
            <div style={{ flexShrink: 0 }}>
              <ResponsiveContainer width={170} height={180}>
                <PieChart>
                  <Pie data={pd} cx="50%" cy="50%" innerRadius={45} outerRadius={78} dataKey="value" labelLine={false}>
                    {pd.map((d, i) => <Cell key={i} fill={d.color} />)}
                  </Pie>
                  <Tooltip formatter={(v, name) => [`${v} (${((v / flowTotal) * 100).toFixed(1)}%)`, name]} />
                </PieChart>
              </ResponsiveContainer>
            </div>
            <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 5 }}>
              {pd.map((d, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 7 }}>
                  <div style={{ width: 9, height: 9, borderRadius: "50%", background: d.color, flexShrink: 0 }} />
                  <div style={{ flex: 1, fontSize: 10, color: C.textSub, lineHeight: 1.3 }}>{d.name}</div>
                  <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 700, color: C.navy, whiteSpace: "nowrap" }}>
                    {d.value} <span style={{ color: C.textMuted, fontWeight: 400 }}>({((d.value / flowTotal) * 100).toFixed(1)}%)</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Hourly chart */}
        <div style={{ background: C.white, borderRadius: 12, padding: "18px 20px", boxShadow: "0 2px 10px rgba(0,0,0,0.06)", border: `1px solid ${C.borderLight}` }}>
          <div style={{ fontWeight: 700, color: C.navy, marginBottom: 14 }}>Llamadas por Hora</div>
          <ResponsiveContainer width="100%" height={210}>
            <ComposedChart data={m.hourlyData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f0f4f8" />
              <XAxis dataKey="hora" tick={{ fontSize: 9, fill: C.textMuted }} />
              <YAxis yAxisId="left" tick={{ fontSize: 9, fill: C.textMuted }} />
              <YAxis yAxisId="right" orientation="right" tick={{ fontSize: 9, fill: C.orange }} tickFormatter={v => `${v}s`} />
              <Tooltip formatter={(v, name) => {
                if (name === "durPromedio") return [fmtSec(v), "Dur. promedio"];
                if (name === "pctColgadas") return [`${v}%`, "% Colgadas"];
                return [v, "Llamadas"];
              }} />
              <Legend iconType="circle" iconSize={8} wrapperStyle={{ fontSize: 10 }}
                formatter={v => v === "durPromedio" ? "Dur. promedio" : v === "pctColgadas" ? "% Colgadas" : "Llamadas"} />
              <Bar yAxisId="left" dataKey="llamadas" fill={C.navy} radius={[3, 3, 0, 0]} />
              <Line yAxisId="right" type="monotone" dataKey="durPromedio" stroke={C.orange} strokeWidth={2} dot={{ r: 2, fill: C.orange }} />
              <Line yAxisId="right" type="monotone" dataKey="pctColgadas" stroke="#2ecc71" strokeWidth={2} strokeDasharray="5 3" dot={{ r: 2, fill: "#2ecc71" }} />
            </ComposedChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* Flow table with avg duration */}
      <div style={{ background: C.white, borderRadius: 12, padding: "18px 20px", boxShadow: "0 2px 10px rgba(0,0,0,0.06)", border: `1px solid ${C.borderLight}` }}>
        <div style={{ fontWeight: 700, color: C.navy, marginBottom: 14 }}>📋 Detalle de Flujos de Destino</div>
        <FlowTable flows={m.flows} flowAvgDur={m.flowAvgDur} total={m.total} />
      </div>
    </div>
  );
}

// ─── COUNTRY VIEW (Acumulado / Por Fecha) ─────────────────────────────────────
function CountryView({ country, history }) {
  const [subTab, setSubTab] = useState("acumulado");
  const [selectedDate, setSelectedDate] = useState("");

  const days = history.filter(h => h.country === country).sort((a, b) => a.fecha.localeCompare(b.fecha));
  const dates = [...new Set(days.map(d => d.fecha))].sort();

  if (!days.length) return <CountryPanel m={null} />;

  const accumulated = mergeMetrics(days);
  const dayMetric = selectedDate ? days.find(d => d.fecha === selectedDate) || null : null;

  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 18, flexWrap: "wrap", alignItems: "center" }}>
        {[{ id: "acumulado", label: "📊 Acumulado" }, { id: "fecha", label: "📅 Por Fecha" }].map(s => (
          <button key={s.id} onClick={() => setSubTab(s.id)} style={{
            background: subTab === s.id ? C.navyMid : C.white,
            color: subTab === s.id ? "white" : C.navy,
            border: subTab === s.id ? "none" : `1px solid ${C.navyLight}`,
            borderRadius: 8, padding: "7px 18px", fontSize: 13, fontWeight: 600, cursor: "pointer",
          }}>{s.label}</button>
        ))}
        {subTab === "fecha" && (
          <select value={selectedDate} onChange={e => setSelectedDate(e.target.value)}
            style={{ border: `1px solid ${C.navyLight}`, borderRadius: 8, padding: "7px 14px", fontSize: 13, color: C.navy, background: C.white, cursor: "pointer" }}>
            <option value="">— Selecciona una fecha —</option>
            {dates.map(d => <option key={d} value={d}>{d}</option>)}
          </select>
        )}
      </div>

      {subTab === "acumulado" && (
        <div>
          <div style={{ background: C.greenBg, borderRadius: 10, padding: "8px 14px", marginBottom: 16, fontSize: 12, color: "#27ae60", fontWeight: 600 }}>
            ✅ Datos acumulados de {days.length} día{days.length !== 1 ? "s" : ""} · {dates[0]}{dates.length > 1 ? ` → ${dates[dates.length - 1]}` : ""}
          </div>
          <CountryPanel m={accumulated} />
        </div>
      )}
      {subTab === "fecha" && !selectedDate && (
        <div style={{ textAlign: "center", padding: 40, color: C.textMuted }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>📅</div>
          <div style={{ fontWeight: 600 }}>Selecciona una fecha del menú de arriba</div>
          <div style={{ fontSize: 12, marginTop: 6 }}>Fechas disponibles: {dates.join(", ")}</div>
        </div>
      )}
      {subTab === "fecha" && selectedDate && <CountryPanel m={dayMetric} />}
    </div>
  );
}

// ─── REGIONAL PANEL ───────────────────────────────────────────────────────────
function RegionalPanel({ metrics }) {
  const loaded = COUNTRIES.map(c => [c, metrics[c]]).filter(([, m]) => m);
  if (!loaded.length) return (
    <div style={{ textAlign: "center", padding: 60, color: C.textMuted }}>
      <div style={{ fontSize: 48, marginBottom: 12 }}>🌎</div>
      <div style={{ fontWeight: 600, fontSize: 16 }}>Sube archivos CSV de Panamá y/o Costa Rica para ver el resumen</div>
    </div>
  );
  const compareData = loaded.map(([c, m]) => ({
    pais: `${FLAG[c]} ${COUNTRY_NAME[c]}`,
    "Llamadas completas": m.enviados,
    "Llamada colgada": m.colgadas,
  }));
  const durData = loaded.map(([c, m]) => ({
    pais: `${FLAG[c]} ${COUNTRY_NAME[c]}`,
    "Seg. promedio": Number(m.avgDur),
  }));
  return (
    <div>
      <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginBottom: 22 }}>
        {loaded.map(([c, m]) => (
          <div key={c} style={{ flex: "1 1 260px", background: C.white, borderRadius: 12, padding: "18px 20px", boxShadow: "0 2px 10px rgba(0,0,0,0.06)", border: `1px solid ${C.borderLight}` }}>
            <div style={{ fontWeight: 800, fontSize: 16, marginBottom: 12 }}>{FLAG[c]} {COUNTRY_NAME[c]}</div>
            <div style={{ display: "flex", gap: 16, marginBottom: 10 }}>
              <div><div style={{ fontSize: 10, color: C.textMuted, fontWeight: 600, textTransform: "uppercase" }}>Total</div>
                <div style={{ fontSize: 26, fontWeight: 800, color: C.navy, fontFamily: "'IBM Plex Mono', monospace" }}>{m.total}</div></div>
              <div><div style={{ fontSize: 10, color: C.textMuted, fontWeight: 600, textTransform: "uppercase" }}>% Completas</div>
                <div style={{ fontSize: 26, fontWeight: 800, color: C.navy, fontFamily: "'IBM Plex Mono', monospace" }}>{m.tasaExito}%</div></div>
              <div><div style={{ fontSize: 10, color: C.textMuted, fontWeight: 600, textTransform: "uppercase" }}>% Colgadas</div>
                <div style={{ fontSize: 26, fontWeight: 800, color: C.orange, fontFamily: "'IBM Plex Mono', monospace" }}>{m.tasaColgada}%</div></div>
            </div>
            <div style={{ fontSize: 11, color: C.textMuted }}>🤖 {m.voicebot}</div>
            <div style={{ fontSize: 11, color: C.textMuted }}>📅 {m.fecha} · 📄 {m.filename}</div>
          </div>
        ))}
      </div>
      <div style={{ background: C.white, borderRadius: 12, padding: "18px 20px", boxShadow: "0 2px 10px rgba(0,0,0,0.06)", border: `1px solid ${C.borderLight}`, marginBottom: 14 }}>
        <div style={{ fontWeight: 700, color: C.navy, marginBottom: 16 }}>Comparativa — Resultado de Llamadas</div>
        <ResponsiveContainer width="100%" height={250}>
          <BarChart data={compareData}>
            <CartesianGrid strokeDasharray="3 3" stroke="#f0f4f8" />
            <XAxis dataKey="pais" tick={{ fontSize: 13, fill: C.textMuted }} />
            <YAxis tick={{ fontSize: 11, fill: C.textMuted }} />
            <Tooltip /><Legend iconType="circle" iconSize={10} />
            <Bar dataKey="Llamadas completas" fill={C.navy} radius={[4, 4, 0, 0]} />
            <Bar dataKey="Llamada colgada" fill={C.orange} radius={[4, 4, 0, 0]} />
          </BarChart>
        </ResponsiveContainer>
      </div>
      <div style={{ background: C.white, borderRadius: 12, padding: "18px 20px", boxShadow: "0 2px 10px rgba(0,0,0,0.06)", border: `1px solid ${C.borderLight}` }}>
        <div style={{ fontWeight: 700, color: C.navy, marginBottom: 14 }}>⏱️ Duración Promedio por País (segundos)</div>
        <ResponsiveContainer width="100%" height={180}>
          <BarChart data={durData}>
            <CartesianGrid strokeDasharray="3 3" stroke="#f0f4f8" />
            <XAxis dataKey="pais" tick={{ fontSize: 13, fill: C.textMuted }} />
            <YAxis tick={{ fontSize: 11, fill: C.textMuted }} />
            <Tooltip formatter={v => [`${v}s`, "Duración promedio"]} />
            <Bar dataKey="Seg. promedio" fill={C.navyMid} radius={[4, 4, 0, 0]} />
          </BarChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

// ─── HISTORY PANEL ────────────────────────────────────────────────────────────
function HistoryPanel({ history }) {
  const [selectedDay, setSelectedDay] = useState(null);

  if (!history.length) return (
    <div style={{ textAlign: "center", padding: 60, color: C.textMuted }}>
      <div style={{ fontSize: 48, marginBottom: 12 }}>📁</div>
      <div style={{ fontWeight: 600 }}>Sin historial todavía</div>
    </div>
  );

  const trendData = history.map(h => ({
    label: `${FLAG[h.country] || h.country} ${h.fecha}`,
    Completas: h.enviados, Colgadas: h.colgadas,
  }));

  if (selectedDay) return (
    <div>
      <button onClick={() => setSelectedDay(null)} style={{ background: C.white, color: C.navy, border: `1px solid ${C.navyLight}`, borderRadius: 8, padding: "8px 16px", fontSize: 13, fontWeight: 600, cursor: "pointer", marginBottom: 18 }}>
        ← Volver al historial
      </button>
      <div style={{ background: "#f0f7ff", borderRadius: 10, padding: "10px 16px", marginBottom: 18, fontSize: 12, color: C.textSub }}>
        📅 <strong>Día:</strong> {selectedDay.fecha} · {FLAG[selectedDay.country]} {COUNTRY_NAME[selectedDay.country]} · 📄 {selectedDay.filename}
      </div>
      <CountryPanel m={selectedDay} />
    </div>
  );

  return (
    <div>
      {history.length > 1 && (
        <div style={{ background: C.white, borderRadius: 12, padding: "18px 20px", boxShadow: "0 2px 10px rgba(0,0,0,0.06)", border: `1px solid ${C.borderLight}`, marginBottom: 14 }}>
          <div style={{ fontWeight: 700, color: C.navy, marginBottom: 14 }}>📈 Tendencia — historial de días</div>
          <ResponsiveContainer width="100%" height={200}>
            <LineChart data={trendData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f0f4f8" />
              <XAxis dataKey="label" tick={{ fontSize: 9, fill: C.textMuted }} />
              <YAxis tick={{ fontSize: 10, fill: C.textMuted }} />
              <Tooltip /><Legend iconSize={10} />
              <Line type="monotone" dataKey="Completas" name="Llamadas completas" stroke={C.navy} strokeWidth={2} dot={{ r: 4 }} />
              <Line type="monotone" dataKey="Colgadas" name="Llamada colgada" stroke={C.orange} strokeWidth={2} dot={{ r: 4 }} />
            </LineChart>
          </ResponsiveContainer>
        </div>
      )}
      <div style={{ background: C.white, borderRadius: 12, padding: "18px 20px", boxShadow: "0 2px 10px rgba(0,0,0,0.06)", border: `1px solid ${C.borderLight}` }}>
        <div style={{ fontWeight: 700, color: C.navy, marginBottom: 14 }}>📋 Días registrados ({history.length}) — clic en "Ver" para detalle</div>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
            <thead>
              <tr style={{ background: "#f5f8ff" }}>
                {["#", "Fecha", "País", "Archivo", "Total", "Completas", "Colgadas", "% Éxito", ""].map(h => (
                  <th key={h} style={{ padding: "8px 12px", textAlign: "left", color: C.textMuted, fontWeight: 600, borderBottom: `1px solid ${C.borderLight}`, fontSize: 11, whiteSpace: "nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {[...history].reverse().map((row, i) => (
                <tr key={i} style={{ borderBottom: `1px solid ${C.borderLight}` }}
                  onMouseEnter={e => e.currentTarget.style.background = "#f5f8ff"}
                  onMouseLeave={e => e.currentTarget.style.background = "white"}>
                  <td style={{ padding: "8px 12px", color: C.textMuted }}>{history.length - i}</td>
                  <td style={{ padding: "8px 12px", color: C.textSub, fontWeight: 600 }}>{row.fecha}</td>
                  <td style={{ padding: "8px 12px", fontWeight: 700 }}>{FLAG[row.country] || ""} {COUNTRY_NAME[row.country] || row.country}</td>
                  <td style={{ padding: "8px 12px", color: C.textMuted, fontSize: 11, maxWidth: 160, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{row.filename}</td>
                  <td style={{ padding: "8px 12px", fontFamily: "'IBM Plex Mono', monospace", fontWeight: 700, color: C.navy }}>{row.total}</td>
                  <td style={{ padding: "8px 12px", fontFamily: "'IBM Plex Mono', monospace", color: C.navy }}>{row.enviados}</td>
                  <td style={{ padding: "8px 12px", fontFamily: "'IBM Plex Mono', monospace", color: C.orange }}>{row.colgadas}</td>
                  <td style={{ padding: "8px 12px" }}>
                    <span style={{ background: row.tasaExito >= 80 ? C.greenBg : C.redBg, color: row.tasaExito >= 80 ? "#27ae60" : C.orange, borderRadius: 20, padding: "2px 10px", fontSize: 11, fontWeight: 700 }}>
                      {row.tasaExito}%
                    </span>
                  </td>
                  <td style={{ padding: "8px 12px" }}>
                    <button onClick={() => setSelectedDay(row)} style={{ background: C.navy, color: "white", border: "none", borderRadius: 6, padding: "4px 10px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                      Ver →
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function IVRDashboard() {
  const [tab, setTab] = useState("regional");
  const [metrics, setMetrics] = useState({ PA: null, CR: null });
  const [history, setHistory] = useState([]);
  const [alert, setAlert] = useState(null);
  const fileRef = useRef();

  useEffect(() => {
    try {
      const stored = JSON.parse(localStorage.getItem("ivr_placa_v3") || "null");
      if (stored) {
        const { hist, latest } = stored;
        setHistory(hist || []);
        setMetrics(m => ({ ...m, ...(latest || {}) }));
      }
    } catch {}
  }, []);

  const handleFile = useCallback(async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = "";
    const text = await file.text();
    const rows = parseCSV(text);
    if (!rows.length) { setAlert({ type: "error", msg: "Archivo vacío o formato incorrecto." }); return; }
    const days = deriveMetrics(rows, file.name);
    if (!days || !days.length) { setAlert({ type: "error", msg: "No se detectó PA ni CR en el campo Voicebot." }); return; }

    const latest = days[days.length - 1];
    const newMetrics = { ...metrics, [latest.country]: mergeMetrics([...history.filter(h => h.country === latest.country), ...days]) };
    const newHistory = [...history, ...days];
    setMetrics(newMetrics);
    setHistory(newHistory);

    try {
      const latestByCountry = {};
      [...newHistory].reverse().forEach(h => { if (!latestByCountry[h.country]) latestByCountry[h.country] = h; });
      localStorage.setItem("ivr_placa_v3", JSON.stringify({ hist: newHistory, latest: latestByCountry }));
    } catch {}

    const dc = days.length;
    setAlert({ type: "success", msg: `✅ ${file.name} — ${dc} día${dc > 1 ? "s" : ""} · ${rows.length} registros · ${FLAG[latest.country]} ${COUNTRY_NAME[latest.country]}` });
    setTimeout(() => setAlert(null), 5000);
    setTab(latest.country);
  }, [history, metrics]);

  const clearAll = useCallback(() => {
    if (!confirm("¿Borrar todo el historial?")) return;
    setMetrics({ PA: null, CR: null });
    setHistory([]);
    try { localStorage.removeItem("ivr_placa_v3"); } catch {}
  }, []);

  const TABS = [
    { id: "regional", label: "Resumen Regional" },
    { id: "PA", label: `${FLAG.PA} Panamá` },
    { id: "CR", label: `${FLAG.CR} Costa Rica` },
    { id: "history", label: "📁 Historial" },
  ];

  return (
    <div style={{ fontFamily: "'IBM Plex Sans', 'Segoe UI', sans-serif", background: C.bg, minHeight: "100vh", color: C.navy }}>
      <div style={{ background: C.white, borderBottom: `1px solid ${C.border}`, padding: "14px 28px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ background: C.navy, color: "white", borderRadius: 10, width: 44, height: 44, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 14, letterSpacing: "0.05em", flexShrink: 0 }}>IVR</div>
          <div>
            <div style={{ fontWeight: 800, fontSize: 17, color: C.navy }}>Dashboard IVR Consulta de Placa — {FLAG.PA} Panamá · {FLAG.CR} Costa Rica</div>
            <div style={{ fontSize: 12, color: C.textMuted }}>Voicebot Analytics · {history.length} día{history.length !== 1 ? "s" : ""} en historial · {new Date().toLocaleDateString("es-CO", { day: "2-digit", month: "short", year: "numeric" })}</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={() => fileRef.current.click()} style={{ background: C.navy, color: "white", border: "none", borderRadius: 8, padding: "9px 18px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>↑ Subir CSV</button>
          <button onClick={clearAll} style={{ background: C.white, color: C.orange, border: `1px solid ${C.orange}`, borderRadius: 8, padding: "9px 14px", fontSize: 13, cursor: "pointer" }}>🗑️ Limpiar</button>
          <input ref={fileRef} type="file" accept=".csv" onChange={handleFile} style={{ display: "none" }} />
        </div>
      </div>

      {alert && (
        <div style={{ background: alert.type === "error" ? C.redBg : C.greenBg, borderLeft: `4px solid ${alert.type === "error" ? C.orange : C.green}`, padding: "12px 28px", fontSize: 13, color: alert.type === "error" ? "#c0392b" : "#27ae60", fontWeight: 600 }}>
          {alert.msg}
        </div>
      )}

      <div style={{ background: "#fff8f0", borderBottom: `1px solid #fde8d0`, padding: "10px 28px", display: "flex", alignItems: "center", gap: 8, fontSize: 13 }}>
        <span style={{ color: C.orange, fontWeight: 800 }}>●</span>
        <span style={{ color: "#c0520a", fontWeight: 600 }}>Instrucciones:</span>
        <span style={{ color: "#7a4020" }}>Sube un CSV por país. Si el CSV tiene varios días se separan automáticamente. El historial se guarda entre sesiones.</span>
      </div>

      <div style={{ padding: "16px 28px 0", display: "flex", gap: 8, flexWrap: "wrap" }}>
        {TABS.map(t => {
          const hasData = t.id === "regional" ? Object.values(metrics).some(Boolean) : t.id === "history" ? history.length > 0 : !!metrics[t.id];
          return (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              background: tab === t.id ? C.navy : C.white,
              color: tab === t.id ? "white" : hasData ? C.navy : C.textMuted,
              border: tab === t.id ? "none" : `1px solid ${hasData ? C.navyLight : C.border}`,
              borderRadius: 8, padding: "8px 20px", fontSize: 13, fontWeight: 600, cursor: "pointer",
              position: "relative", transition: "all 0.15s",
            }}>
              {t.label}
              {hasData && !["regional", "history"].includes(t.id) && (
                <span style={{ position: "absolute", top: -4, right: -4, width: 8, height: 8, background: C.green, borderRadius: "50%", border: `2px solid ${C.bg}` }} />
              )}
            </button>
          );
        })}
      </div>

      <div style={{ padding: "18px 28px 40px" }}>
        {tab === "regional" && <RegionalPanel metrics={metrics} />}
        {tab === "PA" && <CountryView country="PA" history={history} />}
        {tab === "CR" && <CountryView country="CR" history={history} />}
        {tab === "history" && <HistoryPanel history={history} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(IVRDashboard));
</script>
</body>
</html>
