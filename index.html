  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard IVR Consulta de Placa</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600;800&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#1e3a5f">
    <div style="text-align:center">
      <div style="font-size:40px;margin-bottom:12px">⏳</div>
      <div style="font-weight:700;font-size:16px">Cargando dashboard...</div>
    </div>
  </div>
</div>
<script>
window.onerror = function(msg, src, line) {
  document.getElementById("root").innerHTML = '<div style="padding:40px;text-align:center;color:#c0392b"><div style="font-size:32px;margin-bottom:12px">&#9888;</div><div style="font-weight:700;font-size:16px">Error al cargar</div><pre style="margin-top:12px;font-size:11px;text-align:left;background:#fff0ed;padding:12px;border-radius:8px;overflow:auto;max-width:600px;margin:12px auto 0">' + msg + '\nLinea: ' + line + '</pre></div>';
};
</script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend,
        ResponsiveContainer, LineChart, Line, PieChart, Pie, Cell, ComposedChart } = Recharts;


const C = {
  navy: "#1e3a5f", navyMid: "#2a5298", navyLight: "#3d72c4",
  orange: "#e05c2a", orangeMid: "#f08040",
  bg: "#f0f4f9", white: "#ffffff", border: "#e8eef6", borderLight: "#eef2f7",
  textMuted: "#8a94a6", textSub: "#5a7a9f",
  green: "#2ecc71", greenBg: "#edfff4", redBg: "#fff0ed",
};

const FLAG = { PA: "🇵🇦", CR: "🇨🇷" };
const COUNTRY_NAME = { PA: "Panamá", CR: "Costa Rica" };
const COUNTRIES = ["PA", "CR"];
const FLOW_COLORS = ["#1e3a5f","#3d72c4","#2a5298","#e05c2a","#f08040","#f5aa70","#8a94a6"];

// ─── CSV PARSER ───────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(",");
    return Object.fromEntries(headers.map((h, i) => [h, (vals[i] || "").trim()]));
  });
}

function detectCountry(rows) {
  for (const r of rows) {
    const v = (r["Voicebot"] || "") + (r["Nombre destino"] || "");
    if (v.includes("-pa-")) return "PA";
    if (v.includes("-cr-")) return "CR";
  }
  return null;
}

function parseSec(t) {
  if (!t) return 0;
  const p = t.split(":").map(Number);
  return p.length === 3 ? p[0] * 3600 + p[1] * 60 + p[2] : 0;
}

function fmtSec(s) {
  const n = Number(s);
  if (n < 60) return `${n}s`;
  return `${Math.floor(n / 60)}m ${n % 60}s`;
}

// Extract date from filename: supports DD-MM-YYYY, YYYY-MM-DD, DD_MM_YYYY etc.
function dateFromFilename(filename) {
  const m =
    filename.match(/(\d{2})[_-](\d{2})[_-](\d{4})/) ||
    filename.match(/(\d{4})[_-](\d{2})[_-](\d{2})/);
  if (!m) return null;
  if (m[1].length === 4) return `${m[3]}/${m[2]}/${m[1]}`;
  return `${m[1]}/${m[2]}/${m[3]}`;
}

// ─── FLOW MAP ─────────────────────────────────────────────────────────────────
// Cada entrada: [etiqueta visible, [...patrones a buscar en "Nombre destino" (lowercase)]]
// Se evalúan en orden — el primer match gana.
const FLOW_MAP = [
  // 1. Cliente identificado por teléfono
  ["Cliente identificado por teléfono",   ["phone-identified"]],
  // 2. Cliente identificado por placa
  ["Cliente identificado por placa",      ["vplate-identified-fl", "suraplate-identified", "suraplateidentified"]],
  // 3. Cliente no menciona placa
  ["Cliente no menciona placa",           ["vplate-nolase-flow", "nolase-flow"]],
  // 4. Cliente no se identifica por placa
  ["Cliente no se identifica por placa",  ["vplate-unknowed-flow", "unknowed-plate", "plateunidentified", "user-unknowed"]],
  // 5. No se encontró contrato
  ["No se encontró contrato",             ["ccontract-unknowed"]],
  // 6. Fallback
  ["Fallback",                            ["fallback-flow"]],
  // 7. Inactividad
  ["Inactividad",                         ["inactivity"]],
];

function classifyFlow(nombreDestino) {
  const nd = (nombreDestino || "").toLowerCase();
  for (const [label, patterns] of FLOW_MAP) {
    if (patterns.some(p => nd.includes(p))) return label;
  }
  return "Colgada (pendiente funnel)";
}

// Orden fijo para visualizacion - mismo orden que FLOW_MAP + catch-all al final
const FLOW_ORDER = [...FLOW_MAP.map(([label]) => label), "Colgada (pendiente funnel)"];
function sortFlows(entries) {
  return [...entries].sort((a, b) => {
    const ia = FLOW_ORDER.indexOf(a[0]);
    const ib = FLOW_ORDER.indexOf(b[0]);
    return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
  });
}

// ─── METRICS ─────────────────────────────────────────────────────────────────
function deriveMetrics(rows, filename) {
  if (!rows.length) return null;
  const country = detectCountry(rows);
  if (!country) return null;
  const byDate = {};
  rows.forEach(r => {
    const d = r["Fecha"] || "Sin fecha";
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(r);
  });
  return Object.entries(byDate).map(([fecha, dayRows]) => deriveDay(dayRows, filename, country, fecha));
}

function deriveDay(rows, filename, country, fecha) {
  const total = rows.length;
  const voicebot = rows[0]["Voicebot"] || "Desconocido";
  const filenameDate = dateFromFilename(filename);
  if (filenameDate) fecha = filenameDate;

  const resultados = {};
  rows.forEach(r => { const k = r["Finalizado"] || "Sin dato"; resultados[k] = (resultados[k] || 0) + 1; });

  const flows = {};
  const flowDurs = {};
  rows.forEach(r => {
    const dur = parseSec(r["Tiempo total"]);
    const matched = classifyFlow(r["Nombre destino"]);
    flows[matched] = (flows[matched] || 0) + 1;
    if (!flowDurs[matched]) flowDurs[matched] = [];
    if (dur > 0) flowDurs[matched].push(dur);
  });

  const flowAvgDur = {};
  Object.entries(flowDurs).forEach(([k, durs]) => {
    flowAvgDur[k] = durs.length ? Math.round(durs.reduce((a, b) => a + b, 0) / durs.length) : 0;
  });

  const durations = rows.map(r => parseSec(r["Tiempo total"])).filter(d => d > 0);
  const avgDur = durations.length ? (durations.reduce((a, b) => a + b, 0) / durations.length).toFixed(0) : 0;
  const maxDur = durations.length ? Math.max(...durations) : 0;
  const minDur = durations.length ? Math.min(...durations) : 0;

  const byHour = {}, byHourDur = {}, byHourColgadas = {};
  rows.forEach(r => {
    const h = (r["Inicio conversación"] || "").split(":")[0];
    const d = parseSec(r["Tiempo total"]);
    if (h) {
      byHour[h] = (byHour[h] || 0) + 1;
      if (!byHourDur[h]) byHourDur[h] = [];
      if (d > 0) byHourDur[h].push(d);
      if (r["Finalizado"] === "Llamada colgada") byHourColgadas[h] = (byHourColgadas[h] || 0) + 1;
    }
  });
  const hourlyData = Object.entries(byHour)
    .sort((a, b) => Number(a[0]) - Number(b[0]))
    .map(([h, c]) => {
      const durs = byHourDur[h] || [];
      const avg = durs.length ? Math.round(durs.reduce((a, b) => a + b, 0) / durs.length) : 0;
      const col = byHourColgadas[h] || 0;
      return { hora: `${h}:00`, llamadas: c, durPromedio: avg, pctColgadas: +((col / c) * 100).toFixed(1) };
    });

  const enviados = resultados["Envío a IVR"] || 0;
  const colgadas = resultados["Llamada colgada"] || 0;
  const tasaExito = +((enviados / total) * 100).toFixed(1);
  const tasaColgada = +((colgadas / total) * 100).toFixed(1);

  const durColgadas = rows.filter(r => r["Finalizado"] === "Llamada colgada")
    .map(r => parseSec(r["Tiempo total"])).filter(d => d > 0);
  const avgDurColgadas = durColgadas.length
    ? (durColgadas.reduce((a, b) => a + b, 0) / durColgadas.length).toFixed(0) : 0;

  return { country, voicebot, fecha, filename, total, flows, flowAvgDur, avgDur, maxDur, minDur, hourlyData, enviados, colgadas, tasaExito, tasaColgada, avgDurColgadas, _rawRows: rows };
}

// ─── MERGE (ACUMULADO) ────────────────────────────────────────────────────────
function mergeMetrics(days) {
  if (!days.length) return null;
  const total = days.reduce((s, d) => s + d.total, 0);
  const enviados = days.reduce((s, d) => s + d.enviados, 0);
  const colgadas = days.reduce((s, d) => s + d.colgadas, 0);
  const tasaExito = +((enviados / total) * 100).toFixed(1);
  const tasaColgada = +((colgadas / total) * 100).toFixed(1);

  const flows = {};
  const flowDursAcc = {};
  days.forEach(d => {
    Object.entries(d.flows).forEach(([k, v]) => { flows[k] = (flows[k] || 0) + v; });
    if (d.flowAvgDur) Object.entries(d.flowAvgDur).forEach(([k, v]) => {
      if (!flowDursAcc[k]) flowDursAcc[k] = [];
      if (v > 0) flowDursAcc[k].push(v);
    });
  });
  const flowAvgDur = {};
  Object.entries(flowDursAcc).forEach(([k, vs]) => {
    flowAvgDur[k] = vs.length ? Math.round(vs.reduce((a, b) => a + b, 0) / vs.length) : 0;
  });

  const byHour = {};
  days.forEach(d => {
    d.hourlyData.forEach(h => {
      if (!byHour[h.hora]) byHour[h.hora] = { llamadas: 0, durSum: 0, durCount: 0, colgadasSum: 0 };
      byHour[h.hora].llamadas += h.llamadas;
      if (h.durPromedio > 0) { byHour[h.hora].durSum += h.durPromedio; byHour[h.hora].durCount++; }
      byHour[h.hora].colgadasSum += Math.round((h.pctColgadas / 100) * h.llamadas);
    });
  });
  const hourlyData = Object.entries(byHour)
    .sort((a, b) => Number(a[0].split(":")[0]) - Number(b[0].split(":")[0]))
    .map(([hora, v]) => ({
      hora, llamadas: v.llamadas,
      durPromedio: v.durCount ? Math.round(v.durSum / v.durCount) : 0,
      pctColgadas: +((v.colgadasSum / v.llamadas) * 100).toFixed(1),
    }));

  const allDurs = days.flatMap(d => d.avgDur > 0 ? [Number(d.avgDur)] : []);
  const avgDur = allDurs.length ? (allDurs.reduce((a, b) => a + b, 0) / allDurs.length).toFixed(0) : 0;
  const maxDur = days.reduce((m, d) => Math.max(m, d.maxDur), 0);
  const minDur = days.reduce((m, d) => d.minDur > 0 ? Math.min(m, d.minDur) : m, Infinity);
  const allColgDurs = days.flatMap(d => d.avgDurColgadas > 0 ? [Number(d.avgDurColgadas)] : []);
  const avgDurColgadas = allColgDurs.length
    ? (allColgDurs.reduce((a, b) => a + b, 0) / allColgDurs.length).toFixed(0) : 0;

  const fechas = [...new Set(days.map(d => d.fecha))].sort();
  return {
    country: days[0].country, voicebot: days[0].voicebot,
    fecha: fechas.length === 1 ? fechas[0] : `${fechas[0]} → ${fechas[fechas.length - 1]}`,
    filename: `${days.length} archivo(s)`,
    total, enviados, colgadas, tasaExito, tasaColgada,
    flows, flowAvgDur, hourlyData, avgDur, maxDur,
    minDur: minDur === Infinity ? 0 : minDur, avgDurColgadas,
  };
}

// ─── STAT CARD ────────────────────────────────────────────────────────────────
function StatCard({ label, value, sub, accent, icon }) {
  return (
    <div style={{ background: C.white, borderRadius: 12, padding: "16px 20px", boxShadow: "0 2px 10px rgba(0,0,0,0.06)", border: `1px solid ${C.borderLight}`, flex: "1 1 150px", minWidth: 140 }}>
      <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>{icon} {label}</div>
      <div style={{ fontSize: 26, fontWeight: 800, color: accent || C.navy, fontFamily: "'IBM Plex Mono', monospace", lineHeight: 1.1 }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: C.textMuted, marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

// ─── FLOW TABLE (with avg duration) ──────────────────────────────────────────
function FlowTable({ flows, flowAvgDur, total }) {
  return (
    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
      <thead>
        <tr style={{ background: "#f5f8ff" }}>
          {["Flujo de Destino", "Llamadas", "% del Total", "Dur. Promedio"].map(h => (
            <th key={h} style={{ padding: "8px 12px", textAlign: "left", color: C.textMuted, fontWeight: 600, borderBottom: `1px solid ${C.borderLight}`, fontSize: 11 }}>{h}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {sortFlows(Object.entries(flows)).map(([flow, count]) => (
          <tr key={flow} style={{ borderBottom: `1px solid ${C.borderLight}` }}>
            <td style={{ padding: "8px 12px", color: C.textSub }}>{flow}</td>
            <td style={{ padding: "8px 12px", fontFamily: "'IBM Plex Mono', monospace", fontWeight: 700, color: C.navy }}>{count}</td>
            <td style={{ padding: "8px 12px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ flex: 1, background: C.borderLight, borderRadius: 4, height: 6 }}>
                  <div style={{ width: `${((count / total) * 100).toFixed(0)}%`, background: C.navy, borderRadius: 4, height: 6 }} />
                </div>
                <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: C.textMuted, minWidth: 38 }}>
                  {((count / total) * 100).toFixed(1)}%
                </span>
              </div>
            </td>
            <td style={{ padding: "8px 12px", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: C.navyMid, fontWeight: 600 }}>
              {flowAvgDur && flowAvgDur[flow] ? fmtSec(flowAvgDur[flow]) : "—"}
            </td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

// ─── COUNTRY PANEL ────────────────────────────────────────────────────────────
function CountryPanel({ m }) {
  if (!m) return (
    <div style={{ textAlign: "center", padding: 60, color: C.textMuted }}>
      <div style={{ fontSize: 48, marginBottom: 12 }}>📂</div>
      <div style={{ fontWeight: 600, fontSize: 16 }}>Sin datos cargados</div>
      <div style={{ fontSize: 13, marginTop: 6 }}>Sube un archivo CSV usando el botón de arriba.</div>
    </div>
  );

  const pd = sortFlows(Object.entries(m.flows))
    .map(([name, value], i) => ({ name, value, color: FLOW_COLORS[i % FLOW_COLORS.length] }));
  const flowTotal = pd.reduce((s, d) => s + d.value, 0);

  return (
    <div>
      <div style={{ background: "#f0f7ff", borderRadius: 10, padding: "10px 16px", marginBottom: 18, fontSize: 12, color: C.textSub, display: "flex", gap: 24, flexWrap: "wrap" }}>
        <span>🤖 <strong>Voicebot:</strong> {m.voicebot}</span>
        <span>📅 <strong>Fecha:</strong> {m.fecha}</span>
        <span>📄 <strong>Archivo:</strong> {m.filename}</span>
        <span>📞 <strong>Total:</strong> {m.total}</span>
      </div>

      <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 20 }}>
        <StatCard label="Total Llamadas" value={m.total} icon="📞" />
        <StatCard label="Llamadas completas" value={m.enviados} sub={`${m.tasaExito}% del total`} accent={C.navy} icon="✅" />
        <StatCard label="Llamadas Colgadas" value={m.colgadas} sub={`${m.tasaColgada}% del total`} accent={C.orange} icon="📵" />
        <StatCard label="Duración Promedio" value={fmtSec(m.avgDur)} sub={`Mín: ${fmtSec(m.minDur)} · Máx: ${fmtSec(m.maxDur)}`} icon="⏱️" />
        <StatCard label="Dur. Prom. Colgadas" value={fmtSec(m.avgDurColgadas)} sub="Promedio llamadas colgadas" accent={C.orange} icon="⏱️" />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 18 }}>
        {/* Donut flujos */}
        <div style={{ background: C.white, borderRadius: 12, padding: "18px 20px", boxShadow: "0 2px 10px rgba(0,0,0,0.06)", border: `1px solid ${C.borderLight}` }}>
          <div style={{ fontWeight: 700, color: C.navy, marginBottom: 14 }}>📊 Distribución de Flujos de Destino</div>
          <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
            <div style={{ flexShrink: 0 }}>
              <ResponsiveContainer width={170} height={180}>
                <PieChart>
                  <Pie data={pd} cx="50%" cy="50%" innerRadius={45} outerRadius={78} dataKey="value" labelLine={false}>
                    {pd.map((d, i) => <Cell key={i} fill={d.color} />)}
                  </Pie>
                  <Tooltip formatter={(v, name) => [`${v} (${((v / flowTotal) * 100).toFixed(1)}%)`, name]} />
                </PieChart>
              </ResponsiveContainer>
            </div>
            <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 5 }}>
              {pd.map((d, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 7 }}>
                  <div style={{ width: 9, height: 9, borderRadius: "50%", background: d.color, flexShrink: 0 }} />
                  <div style={{ flex: 1, fontSize: 10, color: C.textSub, lineHeight: 1.3 }}>{d.name}</div>
                  <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 700, color: C.navy, whiteSpace: "nowrap" }}>
                    {d.value} <span style={{ color: C.textMuted, fontWeight: 400 }}>({((d.value / flowTotal) * 100).toFixed(1)}%)</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Hourly chart */}
        <div style={{ background: C.white, borderRadius: 12, padding: "18px 20px", boxShadow: "0 2px 10px rgba(0,0,0,0.06)", border: `1px solid ${C.borderLight}` }}>
          <div style={{ fontWeight: 700, color: C.navy, marginBottom: 14 }}>Llamadas por Hora</div>
          <ResponsiveContainer width="100%" height={210}>
            <ComposedChart data={m.hourlyData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f0f4f8" />
              <XAxis dataKey="hora" tick={{ fontSize: 9, fill: C.textMuted }} />
              <YAxis yAxisId="left" tick={{ fontSize: 9, fill: C.textMuted }} />
              <YAxis yAxisId="right" orientation="right" tick={{ fontSize: 9, fill: C.orange }} tickFormatter={v => `${v}s`} />
              <Tooltip formatter={(v, name) => {
                if (name === "durPromedio") return [fmtSec(v), "Dur. promedio"];
                if (name === "pctColgadas") return [`${v}%`, "% Colgadas"];
                return [v, "Llamadas"];
              }} />
              <Legend iconType="circle" iconSize={8} wrapperStyle={{ fontSize: 10 }}
                formatter={v => v === "durPromedio" ? "Dur. promedio" : v === "pctColgadas" ? "% Colgadas" : "Llamadas"} />
              <Bar yAxisId="left" dataKey="llamadas" fill={C.navy} radius={[3, 3, 0, 0]} />
              <Line yAxisId="right" type="monotone" dataKey="durPromedio" stroke={C.orange} strokeWidth={2} dot={{ r: 2, fill: C.orange }} />
              <Line yAxisId="right" type="monotone" dataKey="pctColgadas" stroke="#2ecc71" strokeWidth={2} strokeDasharray="5 3" dot={{ r: 2, fill: "#2ecc71" }} />
            </ComposedChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* Flow table with avg duration */}
      <div style={{ background: C.white, borderRadius: 12, padding: "18px 20px", boxShadow: "0 2px 10px rgba(0,0,0,0.06)", border: `1px solid ${C.borderLight}` }}>
        <div style={{ fontWeight: 700, color: C.navy, marginBottom: 14 }}>📋 Detalle de Flujos de Destino</div>
        <FlowTable flows={m.flows} flowAvgDur={m.flowAvgDur} total={m.total} />
      </div>
    </div>
  );
}

// ─── COUNTRY VIEW (Acumulado / Por Fecha) ─────────────────────────────────────
function CountryView({ country, history }) {
  const [selectedDate, setSelectedDate] = useState("all");

  const days = history.filter(h => h.country === country).sort((a, b) => a.fecha.localeCompare(b.fecha));
  const dates = [...new Set(days.map(d => d.fecha))].sort();

  if (!days.length) return <CountryPanel m={null} />;

  const dayMetric = selectedDate === "all"
    ? mergeMetrics(days)
    : mergeMetrics(days.filter(d => d.fecha === selectedDate));

  return (
    <div>
      <div style={{ display:"flex", gap:8, marginBottom:18, flexWrap:"wrap", alignItems:"center" }}>
        <span style={{ fontSize:12, color:C.textSub, fontWeight:600 }}>📅 Ver:</span>
        <button onClick={() => setSelectedDate("all")} style={{
          background: selectedDate==="all" ? C.navyMid : C.white,
          color: selectedDate==="all" ? "white" : C.navy,
          border: selectedDate==="all" ? "none" : `1px solid ${C.navyLight}`,
          borderRadius:8, padding:"7px 18px", fontSize:13, fontWeight:600, cursor:"pointer",
        }}>
          📊 Acumulado ({days.reduce((s,d)=>s+d.total,0)})
        </button>
        {dates.map(d => {
          const count = days.filter(x=>x.fecha===d).reduce((s,x)=>s+x.total,0);
          return (
            <button key={d} onClick={() => setSelectedDate(d)} style={{
              background: selectedDate===d ? C.navy : C.white,
              color: selectedDate===d ? "white" : C.navy,
              border: selectedDate===d ? "none" : `1px solid ${C.navyLight}`,
              borderRadius:8, padding:"7px 16px", fontSize:12, fontWeight:600, cursor:"pointer",
            }}>
              {d} <span style={{ opacity:.7, fontWeight:400 }}>({count})</span>
            </button>
          );
        })}
      </div>
      {selectedDate === "all" && (
        <div style={{ background:C.greenBg, borderRadius:10, padding:"8px 14px", marginBottom:16, fontSize:12, color:"#27ae60", fontWeight:600 }}>
          ✅ Acumulado · {dates.length} día{dates.length!==1?"s":""} · {dates[0]}{dates.length>1?` → ${dates[dates.length-1]}`:""}
        </div>
      )}
      <CountryPanel m={dayMetric} />
    </div>
  );
}

// ─── CROSS PANEL ─────────────────────────────────────────────────────────────
function CrossPanel({ history }) {
  const [agentRows, setAgentRows]     = useState([]);
  const [agentFilename, setAgentFilename] = useState("");
  const [fileType, setFileType]       = useState(null);
  const [result, setResult]           = useState(null);
  const [alertMsg, setAlertMsg]       = useState(null);
  const [dateFilter, setDateFilter]   = useState("all");
  const fileRef = useRef();

  function toTs(date, time) {
    try {
      const [d,m,y] = date.trim().split("/");
      const [hh,mm,ss] = time.trim().split(":");
      return new Date(+y,+m-1,+d,+hh,+mm,+ss).getTime()/1000;
    } catch { return 0; }
  }

  function detectFileType(rows) {
    if (!rows.length) return null;
    const h = Object.keys(rows[0]);
    if (h.includes("Número de contacto") && h.includes("Hora inicio")) return "agent_report";
    if (h.includes("callType") && h.includes("callDate")) return "cdr";
    return "agent_report";
  }

  const handleFile = useCallback(async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = "";
    const text = await file.text();
    const rows = parseCSV(text);
    if (!rows.length) { setAlertMsg({ type:"error", msg:"Archivo vacío." }); return; }
    const type = detectFileType(rows);
    setAgentRows(rows);
    setAgentFilename(file.name);
    setFileType(type);
    setResult(null);
    const fnDate = dateFromFilename(file.name);
    const dates = type === "agent_report"
      ? [...new Set(rows.map(r=>r["Fecha"]).filter(Boolean))].sort()
      : [...new Set(rows.map(r=>r["callDate"]).filter(Boolean))].sort();
    const count = type === "agent_report" ? rows.length
      : rows.filter(r=>r["callType"]==="CALL_TO_AGENT"&&r["disposition"]==="ANSWERED").length;
    setAlertMsg({ type:"success", msg:`✅ ${file.name} · ${type==="agent_report"?"Reporte agente":"CDR"} · ${count} registros · Fechas: ${fnDate||dates.join(", ")}` });
    setTimeout(()=>setAlertMsg(null),5000);
  }, []);

  const runCross = useCallback(() => {
    if (!agentRows.length || !history.length) return;
    const allVbRows = history.flatMap(h => h._rawRows || []);
    const matched = [];
    const usedAgent = new Set();

    if (fileType === "agent_report") {
      const agIndex = {};
      agentRows.forEach((r, i) => {
        const phone = (r["Número de contacto"]||"").trim();
        if (!phone) return;
        if (!agIndex[phone]) agIndex[phone] = [];
        agIndex[phone].push({ r, i });
      });

      allVbRows.forEach((vr, vbIdx) => {
        const phone = (vr["Número Contacto"]||"").trim();
        if (!phone) return;
        const candidates = (agIndex[phone]||[]).filter(c => !usedAgent.has(c.i));
        if (!candidates.length) return;
        const { r: ar, i: ai } = candidates[0];
        usedAgent.add(ai);
        const vbDur = parseSec(vr["Tiempo total"]||"");
        const agDur = parseSec(ar["Duración"]||"");
        const cola  = parseSec(ar["Tiempo en cola"]||"");
        matched.push({
          phone,
          _vbIdx: vbIdx,
          fechaVb: vr["Fecha"]||"",
          fechaAg: ar["Fecha"]||"",
          horaVb:  vr["Inicio conversación"]||"",
          horaAg:  ar["Hora inicio"]||"",
          finalizado:   vr["Finalizado"]||"",
          destino: classifyFlow(vr["Nombre destino"]),
          vbDur, agDur, cola,
          totalDur: vbDur + agDur,
          agente:       ar["Agente"]||"",
          tipificacion: ar["Tipificación 1"]||"",
          terminadoPor: ar["Terminado por"]||"",
        });
      });
    } else {
      const WINDOW = 180;
      const agentCdr = agentRows.filter(r=>r["callType"]==="CALL_TO_AGENT"&&r["disposition"]==="ANSWERED");
      allVbRows.forEach((vr, vbIdx) => {
        const phone = (vr["Número Contacto"]||"").trim();
        const fecha = (vr["Fecha"]||"").trim();
        const vbEnd = toTs(fecha, vr["Inicio conversación"]||"") + parseSec(vr["Tiempo total"]||"");
        if (!phone||!vbEnd) return;
        let best=null, bestDiff=WINDOW+1;
        agentCdr.forEach((ar,i) => {
          if (usedAgent.has(i)) return;
          if ((ar["source"]||"").trim()!==phone) return;
          if ((ar["callDate"]||"").trim()!==fecha) return;
          const diff = toTs(ar["callDate"],ar["callTime"]||"") - vbEnd;
          if (diff>=-30&&diff<=WINDOW&&diff<bestDiff){bestDiff=diff;best={ar,i};}
        });
        if (best) {
          usedAgent.add(best.i);
          const vbDur = parseSec(vr["Tiempo total"]||"");
          const agDur = parseSec(best.ar["duration"]||"");
          matched.push({
            phone, _vbIdx: vbIdx,
            fechaVb:fecha, fechaAg:best.ar["callDate"]||"",
            horaVb:vr["Inicio conversación"]||"", horaAg:best.ar["callTime"]||"",
            finalizado:vr["Finalizado"]||"",
            destino: classifyFlow(vr["Nombre destino"]),
            vbDur, agDur, cola:0, totalDur:vbDur+agDur,
            agente:best.ar["agentNumber"]||best.ar["destination"]||"",
            tipificacion:"", terminadoPor:best.ar["disposition"]||"",
          });
        }
      });
    }

    const matchedVbIndices = new Set(matched.map(r => r._vbIdx).filter(i => i !== undefined));
    const unmatchedVbRows = allVbRows.filter((_, idx) => !matchedVbIndices.has(idx));
    setResult({ matched, unmatchedRows: unmatchedVbRows, unmatched: unmatchedVbRows.length, vbTotal:allVbRows.length, agTotal:agentRows.length });
  }, [agentRows, fileType, history]);

  const vbDates = [...new Set(history.map(h=>h.fecha).filter(Boolean))].sort();
  const agDates = agentRows.length
    ? (fileType==="agent_report"
        ? [...new Set(agentRows.map(r=>r["Fecha"]).filter(Boolean))].sort()
        : [...new Set(agentRows.map(r=>r["callDate"]).filter(Boolean))].sort())
    : [];

  return (
    <div>
      <div style={{ background:C.white, borderRadius:12, padding:"20px 24px", boxShadow:"0 2px 10px rgba(0,0,0,0.06)", border:`1px solid ${C.borderLight}`, marginBottom:16 }}>
        <div style={{ fontWeight:700, color:C.navy, fontSize:15, marginBottom:6 }}>🔗 Cruce Voicebot × Agente — por llamada</div>
        <div style={{ fontSize:12, color:C.textMuted, marginBottom:12 }}>
          Cruce por <strong>número de teléfono</strong>. Muestra tiempo en voicebot y tiempo con agente separados por cada llamada, con promedios globales.
        </div>
        <div style={{ fontSize:11, background:"#f5f8ff", borderRadius:6, padding:"6px 10px", marginBottom:14, color:C.textSub }}>
          📅 Voicebot: <strong>{vbDates.join(", ")||"sin datos"}</strong>
          {agDates.length>0 && <span> · Agente: <strong>{agDates.join(", ")}</strong></span>}
        </div>
        {alertMsg && (
          <div style={{ background:alertMsg.type==="error"?C.redBg:C.greenBg, borderLeft:`4px solid ${alertMsg.type==="error"?C.orange:C.green}`, padding:"10px 14px", fontSize:12, color:alertMsg.type==="error"?"#c0392b":"#27ae60", fontWeight:600, borderRadius:8, marginBottom:14 }}>
            {alertMsg.msg}
          </div>
        )}
        <div style={{ display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
          <button onClick={()=>fileRef.current.click()} style={{ background:C.navyMid, color:"white", border:"none", borderRadius:8, padding:"9px 18px", fontSize:13, fontWeight:600, cursor:"pointer" }}>
            📂 Subir reporte agente
          </button>
          {agentRows.length>0 && (
            <button onClick={runCross} style={{ background:C.orange, color:"white", border:"none", borderRadius:8, padding:"9px 18px", fontSize:13, fontWeight:600, cursor:"pointer" }}>
              🔗 Cruzar datos
            </button>
          )}
          {agentFilename && <span style={{ fontSize:12, color:C.textMuted }}>📄 {agentFilename} · {agentRows.length} filas</span>}
          <input ref={fileRef} type="file" accept=".csv" onChange={handleFile} style={{ display:"none" }} />
        </div>
      </div>

      {agentRows.length>0 && (
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:16 }}>
          <div style={{ background:"#f0f7ff", borderRadius:12, padding:"16px 20px", border:`1px solid ${C.navyLight}` }}>
            <div style={{ fontWeight:700, color:C.navy, marginBottom:10, fontSize:13 }}>🤖 Voicebot</div>
            <div style={{ display:"flex", gap:16 }}>
              <div><div style={{ fontSize:10, color:C.textMuted, fontWeight:600, textTransform:"uppercase" }}>Llamadas</div>
                <div style={{ fontSize:26, fontWeight:800, color:C.navy, fontFamily:"'IBM Plex Mono',monospace" }}>{history.reduce((s,h)=>s+h.total,0)}</div></div>
              <div><div style={{ fontSize:10, color:C.textMuted, fontWeight:600, textTransform:"uppercase" }}>Dur. prom.</div>
                <div style={{ fontSize:26, fontWeight:800, color:C.navy, fontFamily:"'IBM Plex Mono',monospace" }}>
                  {fmtSec(Math.round(history.reduce((s,h)=>s+Number(h.avgDur||0),0)/Math.max(history.length,1)))}
                </div></div>
            </div>
          </div>
          <div style={{ background:"#fff8f0", borderRadius:12, padding:"16px 20px", border:`1px solid #fde8d0` }}>
            <div style={{ fontWeight:700, color:C.orange, marginBottom:10, fontSize:13 }}>👤 Agente</div>
            <div style={{ display:"flex", gap:16 }}>
              <div><div style={{ fontSize:10, color:C.textMuted, fontWeight:600, textTransform:"uppercase" }}>Registros</div>
                <div style={{ fontSize:26, fontWeight:800, color:C.orange, fontFamily:"'IBM Plex Mono',monospace" }}>{agentRows.length}</div></div>
              <div><div style={{ fontSize:10, color:C.textMuted, fontWeight:600, textTransform:"uppercase" }}>Dur. prom.</div>
                <div style={{ fontSize:26, fontWeight:800, color:C.orange, fontFamily:"'IBM Plex Mono',monospace" }}>
                  {(()=>{ const durs=agentRows.map(r=>parseSec(r["Duración"]||r["duration"]||"")).filter(d=>d>0); return durs.length?fmtSec(Math.round(durs.reduce((a,b)=>a+b,0)/durs.length)):"—"; })()}
                </div></div>
            </div>
          </div>
        </div>
      )}

      {result && (()=>{
        const allMatched = result.matched;
        if (!allMatched.length) return (
          <div style={{ textAlign:"center", padding:40, color:C.textMuted, background:C.white, borderRadius:12, border:`1px solid ${C.borderLight}` }}>
            <div style={{ fontSize:36, marginBottom:10 }}>🔍</div>
            <div style={{ fontWeight:600 }}>No se encontraron cruces</div>
            <div style={{ fontSize:12, marginTop:6 }}>Los números de teléfono no coinciden entre ambos archivos.</div>
          </div>
        );

        const availDates = ["all", ...new Set(allMatched.map(r => r.fechaVb).filter(Boolean)).values()].sort();
        const m = dateFilter === "all" ? allMatched : allMatched.filter(r => r.fechaVb === dateFilter);
        const filteredUnmatched = dateFilter === "all"
          ? result.unmatchedRows
          : result.unmatchedRows.filter(vr => (vr["Fecha"]||"").trim() === dateFilter);

        const avgVb   = m.length ? Math.round(m.reduce((s,r)=>s+r.vbDur,0)/m.length) : 0;
        const avgAg   = m.length ? Math.round(m.reduce((s,r)=>s+r.agDur,0)/m.length) : 0;
        const avgCola = m.length ? Math.round(m.reduce((s,r)=>s+r.cola,0)/m.length) : 0;
        const avgTot  = m.length ? Math.round(m.reduce((s,r)=>s+r.totalDur,0)/m.length) : 0;
        const totVb   = m.reduce((s,r)=>s+r.vbDur,0);
        const totAg   = m.reduce((s,r)=>s+r.agDur,0);

        // ── Agrupación por flujo ──────────────────────────────────────────────
        const byFlow = {};
        m.forEach(r => {
          const f = r.destino || "Sin destino";
          if (!byFlow[f]) byFlow[f] = { vDurs:[], aDurs:[], totDurs:[], count:0 };
          byFlow[f].vDurs.push(r.vbDur);
          byFlow[f].aDurs.push(r.agDur);
          byFlow[f].totDurs.push(r.totalDur);
          byFlow[f].count++;
        });

        const avg = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0;

        const flowTableData = Object.entries(byFlow)
          .sort((a,b) => b[1].count - a[1].count)
          .map(([flow, d]) => ({
            flow,
            flowShort: flow.length > 22 ? flow.slice(0,22)+"…" : flow,
            count:   d.count,
            avgVb:   avg(d.vDurs),
            avgAg:   avg(d.aDurs),
            avgTot:  avg(d.totDurs),
          }));

        const chartFlowData = flowTableData.map(d => ({
          flow:      d.flowShort,
          "🤖 Voicebot": d.avgVb,
          "👤 Agente":   d.avgAg,
          "🔵 Total":    d.avgTot,
        }));

        return (
          <div>
            {/* ── Filtro de fechas ── */}
            <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap", marginBottom:16 }}>
              <span style={{ fontSize:12, color:C.textSub, fontWeight:600 }}>📅 Ver por:</span>
              {availDates.map(d => (
                <button key={d} onClick={() => setDateFilter(d)} style={{
                  background: dateFilter===d ? C.navy : C.white,
                  color: dateFilter===d ? "white" : C.navy,
                  border: dateFilter===d ? "none" : `1px solid ${C.navyLight}`,
                  borderRadius: 8, padding: "6px 16px", fontSize: 12, fontWeight: 600, cursor: "pointer",
                }}>
                  {d === "all" ? `Todas las fechas (${allMatched.length})` : `${d} (${allMatched.filter(r=>r.fechaVb===d).length})`}
                </button>
              ))}
            </div>

            {/* ── Promedios globales ── */}
            <div style={{ background:"#f0f7ff", borderRadius:12, padding:"18px 20px", border:`2px solid ${C.navyLight}`, marginBottom:16 }}>
              <div style={{ fontWeight:700, color:C.navy, marginBottom:14, fontSize:14 }}>
                📊 Promedios globales — {m.length} llamadas cruzadas{dateFilter!=="all"?` · ${dateFilter}`:""}
              </div>
              <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
                {[
                  { label:"Llamadas cruzadas", value:m.length,        sub:`de ${result.vbTotal} VB / ${result.agTotal} agente`, accent:C.green,    big:true },
                  { label:"Sin cruce",          value:result.unmatched, sub:"Sin coincidencia",                                  accent:C.textMuted, big:false },
                  { label:"⌀ VB",               value:fmtSec(avgVb),   sub:"Promedio en voicebot",                              accent:C.navy,      big:true },
                  { label:"⌀ Agente",            value:fmtSec(avgAg),   sub:"Promedio con agente",                               accent:C.orange,    big:true },
                  { label:"⌀ Total (VB+Ag)",     value:fmtSec(avgTot),  sub:"Tiempo total promedio",                             accent:"#27ae60",   big:true },
                ].map((s,i)=>(
                  <div key={i} style={{ background:C.white, borderRadius:12, padding:s.big?"16px 20px":"12px 16px", boxShadow:"0 2px 10px rgba(0,0,0,0.06)", border:`1px solid ${C.borderLight}`, flex:s.big?"1 1 140px":"1 1 100px" }}>
                    <div style={{ fontSize:10, color:C.textMuted, fontWeight:600, textTransform:"uppercase", marginBottom:4 }}>{s.label}</div>
                    <div style={{ fontSize:s.big?26:20, fontWeight:800, color:s.accent, fontFamily:"'IBM Plex Mono',monospace" }}>{s.value}</div>
                    <div style={{ fontSize:10, color:C.textMuted, marginTop:3 }}>{s.sub}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* ── Gráfico agrupado por flujo ── */}
            <div style={{ background:C.white, borderRadius:12, padding:"18px 20px", boxShadow:"0 2px 10px rgba(0,0,0,0.06)", border:`1px solid ${C.borderLight}`, marginBottom:14 }}>
              <div style={{ fontWeight:700, color:C.navy, marginBottom:4, fontSize:13 }}>⏱️ Duración promedio por flujo de destino</div>
              <div style={{ fontSize:11, color:C.textMuted, marginBottom:14 }}>Voicebot · Agente · Total — en segundos promedio por llamada cruzada</div>
              <ResponsiveContainer width="100%" height={260}>
                <BarChart data={chartFlowData} margin={{ left:8, right:8, bottom:30 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#f0f4f8"/>
                  <XAxis dataKey="flow" tick={{ fontSize:9, fill:C.textMuted }} angle={-20} textAnchor="end" interval={0}/>
                  <YAxis tick={{ fontSize:9, fill:C.textMuted }} tickFormatter={v=>fmtSec(v)}/>
                  <Tooltip formatter={(v,name)=>[fmtSec(v), name]}/>
                  <Legend iconType="circle" iconSize={9} wrapperStyle={{ fontSize:11 }}/>
                  <Bar dataKey="🤖 Voicebot" fill={C.navy}    radius={[3,3,0,0]}/>
                  <Bar dataKey="👤 Agente"   fill={C.orange}  radius={[3,3,0,0]}/>
                  <Bar dataKey="🔵 Total"    fill="#27ae60"   radius={[3,3,0,0]}/>
                </BarChart>
              </ResponsiveContainer>
            </div>

            {/* ── Tabla resumen por flujo ── */}
            <div style={{ background:C.white, borderRadius:12, padding:"18px 20px", boxShadow:"0 2px 10px rgba(0,0,0,0.06)", border:`1px solid ${C.borderLight}` }}>
              <div style={{ fontWeight:700, color:C.navy, marginBottom:14, fontSize:13 }}>📋 Resumen por flujo de destino</div>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                <thead>
                  <tr style={{ background:"#f5f8ff" }}>
                    {["Flujo de Destino","Llamadas","⌀ Voicebot","⌀ Agente","⌀ Total (VB+Ag)"].map(h=>(

// ─── COMPARE PANEL ─────────────────────────────────────────────────────
function ComparePanel({ history }) {
  const [subTab, setSubTab] = useState("vb");

  // ── VB COMPARATOR state ──
  const [vbA, setVbA] = useState([]);   // [mergedMetric, filename, selectedDate]
  const [vbB, setVbB] = useState([]);
  const [vbDateA, setVbDateA] = useState("all");
  const [vbDateB, setVbDateB] = useState("all");
  const fileVbA = useRef(); const fileVbB = useRef();

  // ── CROSS COMPARATOR state ──
  const [crossA, setCrossA] = useState(null);
  const [crossB, setCrossB] = useState(null);
  const [crossDateA, setCrossDateA] = useState("all");
  const [crossDateB, setCrossDateB] = useState("all");
  const [crossAlert, setCrossAlert] = useState(null);
  const fileCA = useRef(); const fileCB = useRef();

  const avg = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0;

  // Load VB CSV — store all days so we can filter by date
  const loadVbFile = useCallback(async (e, slot) => {
    const file = e.target.files[0]; if (!file) return; e.target.value = "";
    const rows = parseCSV(await file.text());
    const days = deriveMetrics(rows, file.name);
    if (!days || !days.length) return;
    if (slot === "A") { setVbA([days, file.name]); setVbDateA("all"); }
    else              { setVbB([days, file.name]); setVbDateB("all"); }
  }, []);

  // Get merged metric for a VB slot given its date filter
  function getVbMetric(slot, dateFilter) {
    const [days] = slot;
    if (!days || !days.length) return null;
    const filtered = dateFilter === "all" ? days : days.filter(d => d.fecha === dateFilter);
    return filtered.length ? mergeMetrics(filtered) : null;
  }

  // Get unique dates from a VB slot
  function getVbDates(slot) {
    const [days] = slot;
    if (!days) return [];
    return [...new Set(days.map(d => d.fecha))].sort();
  }

  // Load agent report and cross against current history
  const loadCrossFile = useCallback(async (e, slot) => {
    const file = e.target.files[0]; if (!file) return; e.target.value = "";
    const rows = parseCSV(await file.text());
    if (!rows.length) return;
    const headers = Object.keys(rows[0]);
    let matchedRows = [];

    if (headers.includes("Nombre destino") && headers.includes("Tiempo total")) {
      matchedRows = rows
        .filter(r => (r["Finalizado"]||"") === "Envío a IVR")
        .map(r => ({
          fechaVb:  (r["Fecha"]||"").trim(),
          destino:  classifyFlow(r["Nombre destino"]),
          vbDur:    parseSec(r["Tiempo total"]||""),
          agDur:    0,
          totalDur: parseSec(r["Tiempo total"]||""),
        }));
      setCrossAlert("✅ Slot " + slot + ": " + file.name + " · " + matchedRows.length + " llamadas (solo VB)");
    } else if (headers.includes("Número de contacto") || headers.includes("callType")) {
      const allVbRows = history.flatMap(h => h._rawRows || []);
      if (!allVbRows.length) {
        setCrossAlert("⚠️ Primero carga un CSV de voicebot en la pestaña principal.");
        setTimeout(() => setCrossAlert(null), 4000); return;
      }
      const agIndex = {};
      rows.forEach((r, i) => {
        const phone = (r["Número de contacto"] || r["source"] || "").trim();
        if (phone) { if (!agIndex[phone]) agIndex[phone] = []; agIndex[phone].push({ r, i }); }
      });
      const used = new Set();
      allVbRows.forEach(vr => {
        const phone = (vr["Número Contacto"]||"").trim();
        if (!phone) return;
        const cands = (agIndex[phone]||[]).filter(c=>!used.has(c.i));
        if (!cands.length) return;
        const { r:ar, i:ai } = cands[0]; used.add(ai);
        const vbDur = parseSec(vr["Tiempo total"]||"");
        const agDur = parseSec(ar["Duración"]||ar["duration"]||"");
        matchedRows.push({
          fechaVb:  (vr["Fecha"]||"").trim(),
          destino:  classifyFlow(vr["Nombre destino"]),
          vbDur, agDur, totalDur: vbDur + agDur,
        });
      });
      setCrossAlert("✅ Slot " + slot + ": " + file.name + " · " + matchedRows.length + " cruces");
    } else {
      setCrossAlert("⚠️ Formato no reconocido.");
      setTimeout(() => setCrossAlert(null), 4000); return;
    }

    setTimeout(() => setCrossAlert(null), 5000);
    const label = file.name.replace(/\.csv$/i,"").slice(0,24);
    const dates = [...new Set(matchedRows.map(r=>r.fechaVb).filter(Boolean))].sort();
    if (slot === "A") { setCrossA({ label, rows: matchedRows, dates }); setCrossDateA("all"); }
    else              { setCrossB({ label, rows: matchedRows, dates }); setCrossDateB("all"); }
  }, [history]);

  // Filter cross rows by date
  function getCrossRows(slot, dateFilter) {
    if (!slot) return [];
    return dateFilter === "all" ? slot.rows : slot.rows.filter(r => r.fechaVb === dateFilter);
  }

  // Compute flow summary from matched rows
  function crossFlowData(rows) {
    const byFlow = {};
    rows.forEach(r => {
      const f = r.destino || "Sin destino";
      if (!byFlow[f]) byFlow[f] = { vDurs:[], aDurs:[], totDurs:[] };
      byFlow[f].vDurs.push(r.vbDur);
      byFlow[f].aDurs.push(r.agDur);
      byFlow[f].totDurs.push(r.totalDur);
    });
    return Object.entries(byFlow).map(([flow, d]) => ({
      flow,
      avgVb:  avg(d.vDurs),
      avgAg:  avg(d.aDurs),
      avgTot: avg(d.totDurs),
      count:  d.vDurs.length,
    }));
  }

  function mergedChartData(dataA, dataB, keyFn) {
    const allFlows = [...new Set([...dataA.map(d=>d.flow), ...dataB.map(d=>d.flow)])];
    return allFlows.map(flow => {
      const a = dataA.find(d=>d.flow===flow);
      const b = dataB.find(d=>d.flow===flow);
      return { flow: flow.length>22?flow.slice(0,22)+"…":flow, ...keyFn(a, b) };
    });
  }

  function Delta({ before, after }) {
    if (!before && !after) return null;
    const diff = (after||0) - (before||0);
    const pct  = before ? ((diff/before)*100).toFixed(1) : null;
    const up   = diff > 0;
    return (
      <span style={{ fontSize:10, fontWeight:700, color:up?C.orange:"#27ae60",
        background:up?"#fff0ed":"#edfff4", borderRadius:20, padding:"2px 8px", marginLeft:6 }}>
        {up?"▲":"▼"} {fmtSec(Math.abs(diff))}{pct?` (${pct}%)`:""}
      </span>
    );
  }

  // Date selector component
  function DateSelector({ dates, value, onChange, label }) {
    return (
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center", marginTop:10 }}>
        <span style={{ fontSize:11, color:C.textMuted, fontWeight:600 }}>{label}</span>
        <button onClick={()=>onChange("all")} style={{
          background: value==="all"?C.navyMid:C.white, color:value==="all"?"white":C.navy,
          border:value==="all"?"none":`1px solid ${C.navyLight}`,
          borderRadius:6, padding:"4px 12px", fontSize:11, fontWeight:600, cursor:"pointer"
        }}>Todas</button>
        {dates.map(d => (
          <button key={d} onClick={()=>onChange(d)} style={{
            background: value===d?C.navy:C.white, color:value===d?"white":C.navy,
            border:value===d?"none":`1px solid ${C.navyLight}`,
            borderRadius:6, padding:"4px 10px", fontSize:11, fontWeight:600, cursor:"pointer"
          }}>{d}</button>
        ))}
      </div>
    );
  }

  // ── Computed values for VB comparator ──
  const mVbA = getVbMetric(vbA, vbDateA);
  const mVbB = getVbMetric(vbB, vbDateB);
  const labelA = vbA[1] ? vbA[1].replace(/\.csv$/i,"").slice(0,20) : "Período A";
  const labelB = vbB[1] ? vbB[1].replace(/\.csv$/i,"").slice(0,20) : "Período B";

  function vbFlowData(m) {
    if (!m) return [];
    return Object.entries(m.flows).map(([flow, count]) => ({
      flow, count, avgDur: m.flowAvgDur?.[flow] || 0,
    }));
  }

  const vbDataA = vbFlowData(mVbA);
  const vbDataB = vbFlowData(mVbB);
  const vbChartCalls = mergedChartData(vbDataA, vbDataB, (a,b) => ({
    [labelA]: a?.count  || 0,
    [labelB]: b?.count  || 0,
  }));
  const vbChartDur = mergedChartData(vbDataA, vbDataB, (a,b) => ({
    [labelA]: a?.avgDur || 0,
    [labelB]: b?.avgDur || 0,
  }));

  // ── Computed values for Cross comparator ──
  const rowsA = getCrossRows(crossA, crossDateA);
  const rowsB = getCrossRows(crossB, crossDateB);
  const cdA = crossFlowData(rowsA);
  const cdB = crossFlowData(rowsB);
  const allCrossFlows = [...new Set([...cdA.map(d=>d.flow), ...cdB.map(d=>d.flow)])];
  const chartTot = allCrossFlows.map(flow => {
    const a = cdA.find(d=>d.flow===flow);
    const b = cdB.find(d=>d.flow===flow);
    return {
      flow: flow.length>22?flow.slice(0,22)+"…":flow,
      [`${crossA?.label||"Antes"} — Total`]: a?.avgTot||0,
      [`${crossB?.label||"Después"} — Total`]: b?.avgTot||0,
    };
  });
  const chartVbAg = allCrossFlows.map(flow => {
    const a = cdA.find(d=>d.flow===flow);
    const b = cdB.find(d=>d.flow===flow);
    return {
      flow: flow.length>22?flow.slice(0,22)+"…":flow,
      [`${crossA?.label||"Antes"} — VB`]:     a?.avgVb ||0,
      [`${crossA?.label||"Antes"} — Agente`]: a?.avgAg ||0,
      [`${crossB?.label||"Después"} — VB`]:     b?.avgVb ||0,
      [`${crossB?.label||"Después"} — Agente`]: b?.avgAg ||0,
    };
  });

  return (
    <div>
      {/* Sub-tabs */}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function IVRDashboard() {
  const [tab, setTab] = useState("regional");
  const [metrics, setMetrics] = useState({ PA: null, CR: null });
  const [history, setHistory] = useState([]);
  const [alert, setAlert] = useState(null);
  const fileRef = useRef();

  useEffect(() => {
    try {
      const stored = JSON.parse(localStorage.getItem("ivr_placa_v3") || "null");
      if (stored) {
        const hist = stored.hist || [];
        const latest = stored.latest || {};
        if (hist.length > 0) {
          setHistory(hist);
          setMetrics(m => ({ ...m, ...latest }));
        }
      }
    } catch {}
  }, []);

  const handleFile = useCallback(async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = "";
    const text = await file.text();
    const rows = parseCSV(text);
    if (!rows.length) { setAlert({ type: "error", msg: "Archivo vacío o formato incorrecto." }); return; }
    const days = deriveMetrics(rows, file.name);
    if (!days || !days.length) { setAlert({ type: "error", msg: "No se detectó PA ni CR en el campo Voicebot." }); return; }

    const latest = days[days.length - 1];
    const newMetrics = { ...metrics, [latest.country]: mergeMetrics([...history.filter(h => h.country === latest.country), ...days]) };
    const newHistory = [...history, ...days];
    setMetrics(newMetrics);
    setHistory(newHistory);

    try {
      const latestByCountry = {};
      [...newHistory].reverse().forEach(h => { if (!latestByCountry[h.country]) latestByCountry[h.country] = h; });
      localStorage.setItem("ivr_placa_v3", JSON.stringify({ hist: newHistory, latest: latestByCountry }));
    } catch {}

    const dc = days.length;
    setAlert({ type: "success", msg: `✅ ${file.name} — ${dc} día${dc > 1 ? "s" : ""} · ${rows.length} registros · ${FLAG[latest.country]} ${COUNTRY_NAME[latest.country]}` });
    setTimeout(() => setAlert(null), 5000);
    setTab(latest.country);
  }, [history, metrics]);

  const clearAll = useCallback(() => {
    if (!confirm("¿Borrar todo el historial y datos cargados?")) return;
    setMetrics({ PA: null, CR: null });
    setHistory([]);
    setTab("regional");
    try { localStorage.removeItem("ivr_placa_v3"); } catch {}
    setTimeout(() => window.location.reload(), 300);
  }, []);

  const TABS = [
    { id: "regional", label: "Resumen Regional" },
    { id: "PA", label: `${FLAG.PA} Panamá` },
    { id: "CR", label: `${FLAG.CR} Costa Rica` },
    { id: "history", label: "📁 Historial" },
    { id: "cross", label: "🔗 Cruce Agente" },
    { id: "compare", label: "📊 Comparar" },
  ];

  return (
    <div style={{ fontFamily: "'IBM Plex Sans', 'Segoe UI', sans-serif", background: C.bg, minHeight: "100vh", color: C.navy }}>
      <div style={{ background: C.white, borderBottom: `1px solid ${C.border}`, padding: "14px 28px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ background: C.navy, color: "white", borderRadius: 10, width: 44, height: 44, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 14, letterSpacing: "0.05em", flexShrink: 0 }}>IVR</div>
          <div>
            <div style={{ fontWeight: 800, fontSize: 17, color: C.navy }}>Dashboard IVR Consulta de Placa — {FLAG.PA} Panamá · {FLAG.CR} Costa Rica</div>
            <div style={{ fontSize: 12, color: C.textMuted }}>Voicebot Analytics · {history.length} día{history.length !== 1 ? "s" : ""} en historial · {new Date().toLocaleDateString("es-CO", { day: "2-digit", month: "short", year: "numeric" })}</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={() => fileRef.current.click()} style={{ background: C.navy, color: "white", border: "none", borderRadius: 8, padding: "9px 18px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>↑ Subir CSV</button>
          <button onClick={clearAll} style={{ background: C.white, color: C.orange, border: `1px solid ${C.orange}`, borderRadius: 8, padding: "9px 14px", fontSize: 13, cursor: "pointer" }}>🗑️ Limpiar</button>
          <input ref={fileRef} type="file" accept=".csv" onChange={handleFile} style={{ display: "none" }} />
        </div>
      </div>

      {alert && (
        <div style={{ background: alert.type === "error" ? C.redBg : C.greenBg, borderLeft: `4px solid ${alert.type === "error" ? C.orange : C.green}`, padding: "12px 28px", fontSize: 13, color: alert.type === "error" ? "#c0392b" : "#27ae60", fontWeight: 600 }}>
          {alert.msg}
        </div>
      )}

      <div style={{ background: "#fff8f0", borderBottom: `1px solid #fde8d0`, padding: "10px 28px", display: "flex", alignItems: "center", gap: 8, fontSize: 13 }}>
        <span style={{ color: C.orange, fontWeight: 800 }}>●</span>
        <span style={{ color: "#c0520a", fontWeight: 600 }}>Instrucciones:</span>
        <span style={{ color: "#7a4020" }}>Sube un CSV por país. Si el CSV tiene varios días se separan automáticamente. El historial se guarda entre sesiones.</span>
      </div>

      <div style={{ padding: "16px 28px 0", display: "flex", gap: 8, flexWrap: "wrap" }}>
        {TABS.map(t => {
          const hasData = t.id === "regional" ? Object.values(metrics).some(Boolean) : t.id === "history" ? history.length > 0 : t.id === "cross" || t.id === "compare" ? false : !!metrics[t.id];
          return (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              background: tab === t.id ? C.navy : C.white,
              color: tab === t.id ? "white" : hasData ? C.navy : C.textMuted,
              border: tab === t.id ? "none" : `1px solid ${hasData ? C.navyLight : C.border}`,
              borderRadius: 8, padding: "8px 20px", fontSize: 13, fontWeight: 600, cursor: "pointer",
              position: "relative", transition: "all 0.15s",
            }}>
              {t.label}
              {hasData && !["regional", "history"].includes(t.id) && (
                <span style={{ position: "absolute", top: -4, right: -4, width: 8, height: 8, background: C.green, borderRadius: "50%", border: `2px solid ${C.bg}` }} />
              )}
            </button>
          );
        })}
      </div>

      <div style={{ padding: "18px 28px 40px" }}>
        {tab === "regional" && <RegionalPanel metrics={metrics} />}
        {tab === "PA" && <CountryView country="PA" history={history} />}
        {tab === "CR" && <CountryView country="CR" history={history} />}
        {tab === "history" && <HistoryPanel history={history} />}
        {tab === "cross" && <CrossPanel history={history} />}
        {tab === "compare" && <ComparePanel history={history} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(IVRDashboard));
</script>
</body>
</html>
